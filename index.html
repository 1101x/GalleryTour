<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 갤러리 투어 일기 </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    #wrap { width: 100vw; height: 100vh; position: relative; }
    canvas { width: 100%; height: 100%; display: block; cursor: crosshair; user-select: none; }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.65); color: #fff; cursor: pointer;
      z-index: 10;
    }
    #overlay h1 { font-size: 28px; margin-bottom: 8px; }
    #overlay p { font-size: 15px; opacity: 0.8; margin-bottom: 24px; }
    #overlay .keys { font-size: 13px; opacity: 0.6; line-height: 2.2; text-align: center; }
    #crosshair {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); width: 16px; height: 16px; pointer-events: none; z-index: 5;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; transform: translateY(-50%); }
    #crosshair::after  { left: 50%; top: 0; height: 100%; width: 1px; transform: translateX(-50%); }
    #hud {
      display: none; position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: #fff; font-size: 12px;
      padding: 6px 18px; border-radius: 20px; white-space: nowrap; z-index: 5;
    }
    #badge {
      display: none; position: absolute; top: 14px; left: 14px;
      background: rgba(0,0,0,0.5); color: #fff; font-size: 12px;
      padding: 6px 14px; border-radius: 12px; pointer-events: none; z-index: 5;
    }
    /* Mobile joystick */
    #joystick-area {
      display: none; position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 80px; z-index: 10
    }
    #joystick-base {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      position: absolute;
    }
    #joystick-thumb {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>📍 율곡로 1길</h1>
    <p>클릭해서 걷기 시작</p>
    <div class="keys">
      <b>W / ↑</b> 앞으로 &nbsp;|&nbsp; <b>S / ↓</b> 뒤로<br>
      <b>← →</b> 시선 좌우 회전<br>
      <span style="opacity:0.4;font-size:11px;">모바일: 왼쪽 조이스틱 이동 · 오른쪽 드래그 시선</span>
    </div>
  </div>
  <div id="crosshair"></div>
  <div id="hud">W/S 앞뒤 이동 &nbsp;|&nbsp; ← → 시선 회전</div>
  <div id="badge">📍 율곡로 1길 · 종로구</div>
  <div id="joystick-area">
    <div id="joystick-base"></div>
    <div id="joystick-thumb"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const overlay = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');
const hud = document.getElementById('hud');
const badge = document.getElementById('badge');
const joystickArea = document.getElementById('joystick-area');
const joystickThumb = document.getElementById('joystick-thumb');

const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x87CEEB);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xC9E8F0, 20, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
const camPos = new THREE.Vector3(0, 1.7, 10);
camera.position.copy(camPos);

// Lighting
scene.add(new THREE.AmbientLight(0xfff5e0, 0.75));
const sun = new THREE.DirectionalLight(0xfffacc, 1.3);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40; sun.shadow.camera.bottom = -40;
sun.shadow.camera.far = 100;
scene.add(sun);

// Sky
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(90, 16, 8),
  new THREE.MeshBasicMaterial({color: 0x87CEEB, side: THREE.BackSide})
));

// Road
const road = new THREE.Mesh(new THREE.PlaneGeometry(14, 200), new THREE.MeshLambertMaterial({color: 0x3a3a3a}));
road.rotation.x = -Math.PI / 2; road.receiveShadow = true; scene.add(road);

// Sidewalks
const swMat = new THREE.MeshLambertMaterial({color: 0xb0a898});
[-9.5, 9.5].forEach(sx => {
  const sw = new THREE.Mesh(new THREE.PlaneGeometry(5, 200), swMat);
  sw.rotation.x = -Math.PI / 2; sw.position.set(sx, 0.01, 0); sw.receiveShadow = true; scene.add(sw);
});

// Center lines
for (let z = -90; z < 90; z += 6) {
  const l = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 3.5), new THREE.MeshBasicMaterial({color: 0xF5C518}));
  l.rotation.x = -Math.PI / 2; l.position.set(0, 0.02, z); scene.add(l);
}

// Traditional wall
function makeWall(x, z, len) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.2, len), new THREE.MeshLambertMaterial({color: 0xd4c9b0}));
  w.position.set(x, 1.1, z); w.castShadow = true; w.receiveShadow = true; scene.add(w);
  const cap = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.25, len), new THREE.MeshLambertMaterial({color: 0x888070}));
  cap.position.set(x, 2.35, z); scene.add(cap);
  for (let dz = -len / 2 + 1; dz < len / 2; dz += 1.2) {
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.41, 0.15, 0.9), new THREE.MeshLambertMaterial({color: 0xbfb5a0}));
    t.position.set(x, 0.5, z + dz); scene.add(t);
    const t2 = t.clone(); t2.position.set(x, 1.2, z + dz + 0.6); scene.add(t2);
  }
}
makeWall(-6.8, -20, 90);

// Buildings
function makeBuilding(x, z, w, h, d, color) {
  const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({color}));
  b.position.set(x, h / 2, z); b.castShadow = true; b.receiveShadow = true; scene.add(b);
  const winMat = new THREE.MeshBasicMaterial({color: 0xadd8e6});
  for (let fy = 1.5; fy < h - 0.5; fy += 2.2) {
    for (let fz = -d / 2 + 1.2; fz < d / 2 - 0.5; fz += 2.5) {
      const wm = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.9), winMat);
      wm.position.set(x - w / 2 - 0.01, fy, z + fz); wm.rotation.y = Math.PI; scene.add(wm);
    }
  }
}
makeBuilding(11, -5, 6, 10, 20, 0x8a8a8a);
makeBuilding(12, 18, 5, 8, 14, 0x909090);
makeBuilding(11, -32, 7, 13, 22, 0x7a7a7a);
makeBuilding(11, 40, 6, 9, 16, 0x8e8e8e);

// Trees
function makeTree(x, z, h) {
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.18, h * 0.45, 6), new THREE.MeshLambertMaterial({color: 0x4a3728}));
  trunk.position.set(x, h * 0.225, z); trunk.castShadow = true; scene.add(trunk);
  const bMat = new THREE.MeshLambertMaterial({color: 0x4a3728});
  [0, 0.7, -0.7, 1.4, -1.4, 2.1, -2.1, 2.8].forEach((a, i) => {
    const tilt = [0.4, 0.5, 0.5, 0.35, 0.35, 0.45, 0.45, 0.4][i];
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.07, h * 0.35, 5), bMat);
    br.position.set(x + Math.sin(a) * h * 0.18, h * 0.55, z + Math.cos(a) * h * 0.18);
    br.rotation.z = Math.sin(a) * tilt; br.rotation.x = Math.cos(a) * tilt; scene.add(br);
    const sb = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.04, h * 0.18, 4), bMat);
    sb.position.set(x + Math.sin(a) * h * 0.3, h * 0.65, z + Math.cos(a) * h * 0.3);
    sb.rotation.z = Math.sin(a + 0.5) * 0.7; sb.rotation.x = Math.cos(a + 0.5) * 0.7; scene.add(sb);
  });
}
for (let i = 0; i < 16; i++) makeTree(-5.5, -75 + i * 10, 5 + Math.random() * 2);
for (let i = 0; i < 16; i++) makeTree(7.5, -75 + i * 10, 5 + Math.random() * 2);

// Mountains
[[-8, -95, 18, 22, 0x6b7c6b], [2, -100, 22, 26, 0x5c6e5c], [15, -92, 14, 18, 0x7a8a7a], [-2, -97, 12, 14, 0x8a9a8a]].forEach(([x, z, w, h, c]) => {
  const m = new THREE.Mesh(new THREE.ConeGeometry(w, h, 8), new THREE.MeshLambertMaterial({color: c}));
  m.position.set(x, h / 2 - 1, z); scene.add(m);
});

// Street lights
function makeStreetLight(x, z) {
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 5.5, 6), new THREE.MeshLambertMaterial({color: 0x555555}));
  pole.position.set(x, 2.75, z); pole.castShadow = true; scene.add(pole);
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.5, 5), new THREE.MeshLambertMaterial({color: 0x555555}));
  arm.rotation.z = Math.PI / 2; arm.position.set(x + (x > 0 ? -0.75 : 0.75), 5.3, z); scene.add(arm);
  const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 4), new THREE.MeshBasicMaterial({color: 0xfffacd}));
  lamp.position.set(x + (x > 0 ? -1.5 : 1.5), 5.3, z); scene.add(lamp);
}
for (let z = -75; z < 75; z += 12) makeStreetLight(8.5, z);

// Sign
const sp = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 4, 6), new THREE.MeshLambertMaterial({color: 0x444444}));
sp.position.set(8.2, 2, -2); scene.add(sp);
const sg = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 0.08), new THREE.MeshLambertMaterial({color: 0x1a3a8a}));
sg.position.set(7.2, 4.2, -2); scene.add(sg);

// Cones
[-5.2].forEach(x => [2, 3].forEach(z => {
  const c = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.7, 6), new THREE.MeshLambertMaterial({color: 0xff5500}));
  c.position.set(x, 0.35, z); scene.add(c);
}));

// Scooter
const scBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 1.2), new THREE.MeshLambertMaterial({color: 0xeeeeee}));
scBody.position.set(-1, 0.5, -8); scene.add(scBody);
[-8.6, -7.4].forEach(fz => {
  const wh = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.1, 10), new THREE.MeshLambertMaterial({color: 0x222222}));
  wh.rotation.z = Math.PI / 2; wh.position.set(-1, 0.25, fz); scene.add(wh);
});

// People
function makePerson(x, z, col) {
  const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.9, 0.25), new THREE.MeshLambertMaterial({color: col}));
  b.position.set(x, 1.05, z); b.castShadow = true; scene.add(b);
  const hd = new THREE.Mesh(new THREE.SphereGeometry(0.2, 7, 6), new THREE.MeshLambertMaterial({color: 0xd4a574}));
  hd.position.set(x, 1.75, z); scene.add(hd);
}
[[-6.5, 4, 0x222244], [8.5, -15, 0x334455], [8.8, -16, 0x223355], [9.2, -17, 0x444455]].forEach(([x, z, c]) => makePerson(x, z, c));

// ---- Controls ----
const keys = {};
let yaw = Math.PI, pitch = 0;
let started = false;

// Keyboard
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

function startGame() {
  started = true;
  overlay.style.display = 'none';
  crosshair.style.display = 'block';
  hud.style.display = 'block';
  badge.style.display = 'block';
  if ('ontouchstart' in window) joystickArea.style.display = 'block';
}
overlay.addEventListener('click', startGame);

// 마우스 look 제거 — 시선은 방향키로만

// Touch look (right side of screen)
let lookTouchId = null, lastLTX = 0, lastLTY = 0;
// Joystick (left side)
let joyTouchId = null, joyDX = 0, joyDZ = 0;
const JOY_R = 33;

canvas.addEventListener('touchstart', e => {
  if (!started) { startGame(); return; }
  for (const t of e.changedTouches) {
if (lookTouchId === null) {
      lookTouchId = t.identifier; lastLTX = t.clientX; lastLTY = t.clientY;
    }
  }
  e.preventDefault();
}, {passive: false});

joystickArea.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (joyTouchId === null) { joyTouchId = t.identifier; }
  }
  e.preventDefault();
}, {passive: false});

document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === lookTouchId) {
      yaw -= (t.clientX - lastLTX) * 0.004;
      pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch - (t.clientY - lastLTY) * 0.004));
      lastLTX = t.clientX; lastLTY = t.clientY;
    }
    if (t.identifier === joyTouchId) {
      const rect = joystickArea.getBoundingClientRect();
      const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
      let dx = t.clientX - cx, dy = t.clientY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > JOY_R) { dx = dx / dist * JOY_R; dy = dy / dist * JOY_R; }
      joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      joyDX = dx / JOY_R; joyDZ = dy / JOY_R;
    }
  }
  e.preventDefault();
}, {passive: false});

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === lookTouchId) lookTouchId = null;
    if (t.identifier === joyTouchId) {
      joyTouchId = null; joyDX = 0; joyDZ = 0;
      joystickThumb.style.transform = 'translate(-50%,-50%)';
    }
  }
});

const img1 = "./src/1.png";
const img2 = "./src/2.png";
const img3 = "./src/3.png";
const img4 = "./src/4.png";
const img5 = "./src/5.png";
const img6 = "./src/6.png";
const img7 = "./src/7.png";
const img8 = "./src/8.png";

const artTexts = {"1": "레진에 가둔 나무가 요즘 너무 이뻐보인다.\n그런데 이 붉은 것은 흡사 고기를 닮았다.", "2": "젤리, 클릭커, 그리 고 또..", "3": "전시 공간의 구석\n색과 패턴이 설치미술 그 잡채", "4": "뱀을 목에 두른 노란 강아지\n그림 이름은 무려 no problem present\n너무 귀엽다", "5": "형태 묘사가 뚜렷한 구상화보다\n추상화가 더 재밌는 이유는 무엇일까\n소설보다 시가 더 좋았던 까닭과 같나", "6": "악보위에 콜라쥬를 했다\n그림일기에 오마쥬할것이다", "7": "구 2개를 두 발로 쏘다니며 봤던 작품중\n카페에서 만난 고양이가 제일 아름다우시다", "8": "계피가 좋다\n요즘 꼭 카푸치노를 찾는다."};

const artRatios = {"1": 0.6459, "2": 0.8624, "3": 0.7734, "4": 0.7428, "5": 0.6351, "6": 2.7477, "7": 0.7125, "8": 0.8674};


const style = document.createElement('style');
style.textContent = "@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');";
document.head.appendChild(style);

const FRAME_H = 2.6;

function makeArtwork(imgSrc, text, wx, wy, wz, rotY, ratio) {
  const fh = FRAME_H;
  const fw = fh * ratio;
  const fb = 0.07;

  const loader = new THREE.TextureLoader();
  loader.load(imgSrc, (tex) => {
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(fw + fb*2, fh + fb*2, 0.06),
      new THREE.MeshLambertMaterial({color: 0xffffff})
    );
    frame.position.set(wx, wy, wz);
    frame.rotation.y = rotY;
    scene.add(frame);

    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(fw, fh),
      new THREE.MeshBasicMaterial({map: tex, side: THREE.FrontSide})
    );
    const off = 0.05;
    mesh.position.set(wx + Math.sin(rotY)*off, wy, wz + Math.cos(rotY)*off);
    mesh.rotation.y = rotY;
    scene.add(mesh);
  });

  const lines = text.split('\n');
  const lineH = 38, padV = 28, canvasW = 512;
  const canvasH = lines.length * lineH + padV * 2;
  const c2d = document.createElement('canvas');
  c2d.width = canvasW; c2d.height = canvasH;
  const ctx = c2d.getContext('2d');
  ctx.clearRect(0, 0, canvasW, canvasH);
  ctx.font = "300 22px 'Pretendard', sans-serif";
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.textAlign = 'center';
  lines.forEach((line, i) => {
    ctx.fillText(line, canvasW/2, padV + i*lineH + lineH*0.75);
  });
  const tex2 = new THREE.CanvasTexture(c2d);
  tex2.minFilter = THREE.LinearFilter;
  const tfw = fw * 1.1;
  const tfh = tfw * (canvasH / canvasW);
  const tMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(tfw, tfh),
    new THREE.MeshBasicMaterial({map: tex2, transparent: true, depthWrite: false, side: THREE.FrontSide})
  );
  tMesh.position.set(wx + Math.sin(rotY)*1.0, wy, wz + Math.cos(rotY)*1.0);
  tMesh.rotation.y = rotY;
  scene.add(tMesh);
}

makeArtwork(img1, artTexts['1'], -5.8,  2.3,   2,   Math.PI/2,  artRatios['1']);
makeArtwork(img2, artTexts['2'],  10.0, 2.3,  -2,  -Math.PI/2,  artRatios['2']);
makeArtwork(img3, artTexts['3'], -5.8,  2.3, -14,   Math.PI/2,  artRatios['3']);
makeArtwork(img4, artTexts['4'],  10.0, 2.3, -18,  -Math.PI/2,  artRatios['4']);
makeArtwork(img5, artTexts['5'], -5.8,  2.3, -28,   Math.PI/2,  artRatios['5']);
makeArtwork(img6, artTexts['6'],  10.0, 2.3, -30,  -Math.PI/2,  artRatios['6']);
makeArtwork(img7, artTexts['7'],   1.0, 2.3, -55,   0,          artRatios['7']);
makeArtwork(img8, artTexts['8'],  10.0, 2.3, -44,  -Math.PI/2,  artRatios['8']);

// Animation loop
const clock = new THREE.Clock();
const dir = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const speed = 10;

  if (started) {
    // 좌우 방향키 → 시선 회전
    if (keys['ArrowLeft'])  yaw += 1.2 * dt;
    if (keys['ArrowRight']) yaw -= 1.2 * dt;

    // W/S 또는 위아래 방향키 → 앞뒤 이동만
    const fw = (keys['KeyW'] || keys['ArrowUp']) ? 1 : (keys['KeyS'] || keys['ArrowDown']) ? -1 : 0;
    const fwTotal = fw || -joyDZ;
    const stTotal = -joyDX;

    const sinY = Math.sin(yaw), cosY = Math.cos(yaw);
    camPos.x += (sinY * fwTotal + cosY * stTotal) * speed * dt;
    camPos.z += (cosY * fwTotal - sinY * stTotal) * speed * dt;
    camPos.x = Math.max(-11, Math.min(11, camPos.x));
    camPos.z = Math.max(-85, Math.min(30, camPos.z));
    camPos.y = 1.7;
  }

  camera.position.copy(camPos);
  dir.set(Math.sin(yaw) * Math.cos(pitch), Math.sin(pitch), Math.cos(yaw) * Math.cos(pitch));
  camera.lookAt(camPos.clone().add(dir));
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
